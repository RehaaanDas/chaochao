<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaochao</title>
    <style>
        body{
            display: flex;
            background-color: hsl(70, 8%, 15%);
            color: hsl(54, 70%, 68%);
            font-family: system-ui;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: hsl(70, 8%, 30%); 
        }
        ::-webkit-scrollbar-thumb {
            background: hsl(54, 70%, 68%); 
        }
        #groups{
            background-color: hsl(70, 8%, 15%);
            height: 96vh;
            width: 10%;
            padding: 10px;
            overflow-y: auto;
        }
        .group{
            background-color: hsl(70, 8%, 20%);
            padding: 5px;
        }
        .group:hover{
            background-color: hsl(70, 8%, 10%);
            margin-top: 5px;
            margin-bottom: 5px;
        }
        .group:active{
            background-color: hsl(70, 8%, 40%);
        }
        #messages{
            background-color: hsl(70, 8%, 30%);
            width: 80%;
            padding:10px;
            height: 100vh;
            padding-bottom: 30px;
        }
        #messageslist{
            overflow-y: scroll;
            max-height: 93%;
            display: flex;
            flex-direction: column-reverse;
        }
        .message{
            padding-bottom: 15px;
        }
        .messagecontent{
            font-size: 20px;
            font-weight: bold;
        }
        #members{
            background-color: hsl(70, 8%, 15%);
            width: 10%;
            padding:10px;
            overflow-y: auto;
            height: 100vh;
        }
        .inputs{
            position: absolute; 
            bottom: 0;
            width: 100%;
            margin-bottom: 10px;
        }
        #textinput{
            background-color: hsla(71, 8%, 40%, 0.651);
            height: 10%;
            width: 65%;
            border: none;
            color: hsl(54, 70%, 68%);
            font-family: system-ui;
            font-size: 20px;
            padding: 5px;
            font-weight:bold;
        }
        #textinput::placeholder{
            color: hsl(0, 0%, 17%);
        }
        #textsend{
            height: 35px;
            width: 10%;
            border: none;
            background-color: hsl(32, 98%, 56%);
            font-size: 20px;
            font-family: system-ui;
            font-weight: bold;
        }
        #textsend:hover{
            background-color: hsl(32, 98%, 46%)
        }
        #textsend:active{
            background-color: hsl(32, 98%, 66%);
        }
        #bar{
            height: 3%;
        }
        #serverjointext{
            width: 70%;
        }
        #serverjoinbtn{
            width: 30%;
        }
        #newserver{
            width: 100%;
        }
    </style>
</head>
<body>
        <div id="groups">
            <div>
                <input type="search" placeholder="Servers" id="serverjointext"><button id="serverjoinbtn" onclick="joinserver()">Join</button>
            </div>
            
            <button id="newserver" onclick="newserver(window.prompt('Server Name'))">
                + Create Server
            </button>
            <hr>
        </div>
        <div id="messages">
            <div id="messageslist">
            </div>
            <div class="inputs">
                <input type="text" id="textinput" placeholder="#lobby">
                <button id="textsend" onclick="sndmsg()">Send</button>
            </div>
        </div>
        <div id="members">
        </div>
    <script>

        const wsProtocol = location.protocol === "https:" ? "wss:" : "ws:";
        const socket = new WebSocket(`${wsProtocol}//${location.hostname}:8002`);
        currserver = "";

        function loadservers(servers){
            for(let s of servers){
                document.getElementById("groups").innerHTML += (`
                    <div class="group" onclick="inserver('${s}')">
                        #${s}
                    </div>
                `);
            }
        }

        function loadmembers(members){
            document.getElementById("members").innerHTML = ""
            for(let m of members){
                document.getElementById("members").innerHTML += ("<br>" + m);
            }
        }

        async function newserver(server){
            await socket.send(JSON.stringify({
                "type" : 3,
                "server" : server,
                "uname" : sessionStorage.getItem('ccuname'),
                "new?" : true
            }))
        }

        async function joinserver() {
            await socket.send(JSON.stringify({
                "type" : 3,
                "server" : document.getElementById("serverjointext").value,
                "uname" : sessionStorage.getItem('ccuname'),
                "new?" : false
            }))
        }

        async function inserver(server){
            document.getElementById("textinput").placeholder = `#${server}`;
            currserver = server;

            await socket.send(JSON.stringify({
                "type" : 1,
                "server" : server,
                "uname" : sessionStorage.getItem('ccuname')
            }))
            document.getElementById("messageslist").innerHTML = ""
        }

        async function sndmsg(){
            author = sessionStorage.getItem('ccuname');
            const now = new Date();
            time = now.toLocaleDateString('en-CA') + " " + now.toLocaleTimeString([], {
                hour12: false,
                hour: '2-digit',
                minute: '2-digit'
            });
            content = document.getElementById("textinput").value
            await socket.send(JSON.stringify({
                "type" : 0,
                "uname" : author,
                "server" : currserver,
                "time" : time,
                "content" : content
            }))

            console.log({
                "type" : 0,
                "uname" : author,
                "server" : currserver,
                "time" : time,
                "content" : content
            })
            //socket.send(`${author} ${currserver} ${time} ${encodeURIComponent(content)}`)

            document.getElementById("textinput").value = ""
        }

        function recmsg(author, time, content){
            document.getElementById("messageslist").innerHTML =
            `<div class="message">
            <div><i>${author}</i> ${time}</div>
            <div class="messagecontent">${content}</div>
            </div>` + document.getElementById("messageslist").innerHTML
        }

        document.addEventListener("keypress", function(event){
            if(event.key === "Enter" || event.keyCode === 13){
                console.log("send")
                event.preventDefault();
                sndmsg();
            }
        })

        socket.addEventListener('message', (event) => {
            msg = JSON.parse(event.data);
            console.log(msg);
            if(msg.type == 0 && msg.server == currserver) recmsg(msg.uname, msg.time, msg.content);
            if(msg.type == 1) loadmembers(msg.members);
            if(msg.type == 4) loadservers(msg.servers);
        })

        window.addEventListener("beforeunload", (event) => {
            socket.send(JSON.stringify({
                "type" : 5,
                "uname" : sessionStorage.getItem('ccuname')
            }))
        })

        socket.onopen = async (event) => {
            sessionStorage.setItem('ccuname', window.prompt("Username"))
            await socket.send(JSON.stringify({
                "type" : 4,
                "uname" : sessionStorage.getItem('ccuname'),
                "pass" : window.prompt("Password")
            }))
        }
        
    </script>
</body>
</html>
