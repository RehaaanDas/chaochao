<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaochao | Login</title>
</head>
<body>
    <input type="text" id="username" placeholder="Username"><hr>
    <button onclick="login()">Login</button>

    <script>
        function login(){
            localStorage.setItem("ccusername", document.getElementById("username").value);
            window.location.replace("/index.html")
        }
    </script>
</body>
</html>
